 is the bridge layer — it auto-generates Swift</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="53" y="554" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 2 -6)">bindings from Rust types, so Swift can call Rust functions</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="53" y="567" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 2 -6)">as if they were normal Swift. You won't write the bridge by</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="53" y="580" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 2 -6)">hand.</text></g></g><g><g><path fill="none" stroke="none"/><text fill="#000000" stroke="none" font-family="Arial" font-size="32px" font-style="normal" font-weight="normal" text-decoration="undefined" x="13" y="21" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 2 -6)">Level 2 -</text><text fill="#000000" stroke="none" font-family="Arial" font-size="32px" font-style="normal" font-weight="normal" text-decoration="undefined" x="13" y="53" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 2 -6)">Container</text><text fill="#000000" stroke="none" font-family="Arial" font-size="32px" font-style="normal" font-weight="normal" text-decoration="undefined" x="13" y="85" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 2 -6)">Diagram</text></g></g></g></svg>