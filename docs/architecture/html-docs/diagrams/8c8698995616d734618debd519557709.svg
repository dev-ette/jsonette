"/><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="408" y="115.5" text-anchor="middle" dominant-baseline="central" transform="matrix(1 0 0 1 10 1)">[Person]</text></g></g><g><g><path fill="none" stroke="none"/><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="408" y="138.5" text-anchor="middle" dominant-baseline="central" transform="matrix(1 0 0 1 10 1)">Developer</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="408" y="151.5" text-anchor="middle" dominant-baseline="central" transform="matrix(1 0 0 1 10 1)">wants to deal</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="408" y="164.5" text-anchor="middle" dominant-baseline="central" transform="matrix(1 0 0 1 10 1)">with JSON files</text></g></g><g><path fill="#C0C0C0" stroke="none" paint-order="stroke fill markers" d=" M 159 240 L 699 240 Q 705 240 705 246 L 705 393 Q 705 399 699 399 L 159 399 Q 153 399 153 393 L 153 246 Q 153 240 159 240 Z" fill-opacity="0.2"/></g><g><path fill="#FFFFFF00" stroke="none" paint-order="stroke fill markers" d=" M 152 233 L 692 233 Q 698 233 698 239 L 698 386 Q 698 392 692 392 L 152 392 Q 146 392 146 386 L 146 239 Q 146 233 152 233 Z"/></g><g><path fill="none" stroke="#000000" paint-order="fill stroke markers" d=" M 152 233 L 692 233 Q 698 233 698 239 L 698 386 Q 698 392 692 392 L 152 392 Q 146 392 146 386 L 146 239 Q 146 233 152 233 Z" stroke-miterlimit="10" stroke-dasharray=""/></g><g><g><path fill="none" stroke="none"/><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="bold" text-decoration="undefined" x="412" y="246.5" text-anchor="middle" dominant-baseline="central" transform="matrix(1 0 0 1 10 1)">jsonette</text></g></g><g><g><path fill="none" stroke="none"/><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="412" y="261.5" text-anchor="middle" dominant-baseline="central" transform="matrix(1 0 0 1 10 1)">[Software System]</text></g></g><g><g><path fill="none" stroke="none"/></g></g><g><path fill="#FFFFD8" stroke="none" paint-order="stroke fill markers" d=" M 50 490 L 391 490 L 401 500 L 401 527 L 50 527 L 50 490"/></g><g><path fill="none" stroke="#000000" paint-order="fill stroke markers" d=" M 50 490 L 391 490 L 401 500 L 401 527 L 50 527 L 50 490 L 50 490" stroke-miterlimit="10" stroke-dasharray=""/></g><g><path fill="none" stroke="#000000" paint-order="fill stroke markers" d=" M 391 490 L 391 500 L 401 500 L 391 490" stroke-miterlimit="10" stroke-dasharray=""/></g><g><g><path fill="none" stroke="none"/><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="45" y="494" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">Zero external services. No network needed, The Engine is</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="45" y="507" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">the brain; the shell is the face</text></g></g><g><path fill="#FFFFD8" stroke="none" paint-order="stroke fill markers" d=" M 50 530 L 391 530 L 401 540 L 401 593 L 50 593 L 50 530"/></g><g><path fill="none" stroke="#000000" paint-order="fill stroke markers" d=" M 50 530 L 391 530 L 401 540 L 401 593 L 50 593 L 50 530 L 50 530" stroke-miterlimit="10" stroke-dasharray=""/></g><g><path fill="none" stroke="#000000" paint-order="fill stroke markers" d=" M 391 530 L 391 540 L 401 540 L 391 530" stroke-miterlimit="10" stroke-dasharray=""/></g><g><g><path fill="none" stroke="none"/><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="45" y="534" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">UniFFI is the bridge layer — it auto-generates Swift</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="45" y="547" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">bindings from Rust types, so Swift can call Rust functions</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="45" y="560" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">as if they were normal Swift. You won't write the bridge by</text><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="45" y="573" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">hand.</text></g></g><g><g><path fill="none" stroke="none"/><text fill="#000000" stroke="none" font-family="Arial" font-size="32px" font-style="normal" font-weight="normal" text-decoration="undefined" x="5" y="14" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">Level 1 -</text><text fill="#000000" stroke="none" font-family="Arial" font-size="32px" font-style="normal" font-weight="normal" text-decoration="undefined" x="5" y="46" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">Context</text><text fill="#000000" stroke="none" font-family="Arial" font-size="32px" font-style="normal" font-weight="normal" text-decoration="undefined" x="5" y="78" text-anchor="start" dominant-baseline="text-before-edge" transform="matrix(1 0 0 1 10 1)">Diagram</text></g></g><g><path fill="none" stroke="#000000" paint-order="fill stroke markers" d=" M 420 194 L 420 232" stroke-miterlimit="10" stroke-dasharray="3"/></g><g><path fill="#000000" stroke="none" paint-order="stroke fill markers" d=" M 415.790482243984 221.83732514237585 L 420 232 L 424.209517756016 221.83732514237585"/></g><g><path fill="none" stroke="#000000" paint-order="fill stroke markers" d=" M 415.790482243984 221.83732514237585 L 420 232 L 424.209517756016 221.83732514237585 L 415.790482243984 221.83732514237585" stroke-miterlimit="10" stroke-dasharray=""/></g><g><rect fill="#ffffff" stroke="none" x="378" y="205" width="93.9072265625" height="13" transform="matrix(1 0 0 1 10 1)"/></g><g><g><path fill="none" stroke="none"/><text fill="#000000" stroke="none" font-family="Arial" font-size="13px" font-style="normal" font-weight="normal" text-decoration="undefined" x="424.95361328125" y="211.5" text-anchor="middle" dominant-baseline="central" transform="matrix(1 0 0 1 10 1)">DealsWithJSON</text></g></g></g></svg>