disabled_rules: # rule identifiers to exclude from running
  - trailing_whitespace
  - line_length
  - type_name

opt_in_rules: # some rules are only opt-in
  - empty_count
  - force_unwrapping
  - closure_spacing
  - redundant_nil_coalescing

excluded: # paths to ignore during linting
  - Generated
  - .build

force_unwrapping: error
