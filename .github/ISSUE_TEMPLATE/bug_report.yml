name: Bug report
description: Something is broken or behaving incorrectly
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - engine
        - macos
        - bridge
        - ci
        - perf
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a JSON file containing `{"a": null}`
        2. Run `evaluate_path("$.a")`
        3. Observe panic instead of `null` result
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 15.2
        - Rust: 1.87.0
        - Engine version / commit: abc1234
    validations:
      required: true
