# =============================================================================
# jsonette — GitHub Actions CI
#
# Pipeline: Build - Test - Clippy - fmt
#
# No required GitHub Actions secrets.
# =============================================================================


name: Engine

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------- #
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Build
        run: cargo build --workspace
        working-directory: ./engine

  # -------------------------------------------------------------------------- #
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Test
        run: cargo test --workspace
        working-directory: ./engine

  # -------------------------------------------------------------------------- #
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: ./engine

  # -------------------------------------------------------------------------- #
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Fmt
        run: cargo fmt --check
        working-directory: ./engine

