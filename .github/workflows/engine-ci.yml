# =============================================================================
# jsonette — GitHub Actions CI
#
# Pipeline: Build - Test - Clippy - fmt
#
# No required GitHub Actions secrets.
# =============================================================================


name: Engine

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------- #
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Build
        run: cargo build --workspace
        working-directory: ./engine

  # -------------------------------------------------------------------------- #
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        run: cargo nextest run --workspace --profile ci
        working-directory: ./engine

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: engine/target/nextest/ci/junit.xml

  # -------------------------------------------------------------------------- #
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: ./engine

  # -------------------------------------------------------------------------- #
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Fmt
        run: cargo fmt --check
        working-directory: ./engine

  # -------------------------------------------------------------------------- #
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "engine -> target"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --cobertura --output-path coverage.xml
        working-directory: ./engine

      - name: Generate coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: engine/coverage.xml
          badge: true
          format: markdown
          output: file
          thresholds: '60 80'
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: engine/coverage.xml

      - name: Post coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

