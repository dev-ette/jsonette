# =============================================================================
# jsonette — GitHub Actions CI
#
# Pipeline: Build - Test - Clippy - fmt
#
# No required GitHub Actions secrets.
# =============================================================================


name: Engine

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------- #
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

  # -------------------------------------------------------------------------- #
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        run: cargo nextest run --workspace --profile ci

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/nextest/ci/junit.xml

  # -------------------------------------------------------------------------- #
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  # -------------------------------------------------------------------------- #
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Fmt
        run: cargo fmt --check

  # -------------------------------------------------------------------------- #
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --cobertura --output-path coverage.xml

      - name: Generate coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: file
          thresholds: '60 80'

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7.0.0
        if: github.event_name == 'push'
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Post coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  # -------------------------------------------------------------------------- #
  ffi-bridge:
    name: ffi-bridge
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Rust Library
        run: cargo build

      - name: Generate Swift Bindings
        run: cargo run --bin uniffi-bindgen -- generate --library target/debug/libjsonette_core.dylib --language swift --out-dir bridge-spike/

      - name: Rename Swift Modulemap
        run: mv bridge-spike/jsonette_coreFFI.modulemap bridge-spike/module.modulemap

      - name: Verify Swift Bridge
        run: |
          swiftc -I bridge-spike -L target/debug -ljsonette_core bridge-spike/jsonette_core.swift bridge-spike/main.swift -o bridge-spike/main
          DYLD_LIBRARY_PATH=target/debug/ ./bridge-spike/main

      - name: Generate Python Bindings
        run: cargo run --bin uniffi-bindgen -- generate --library target/debug/libjsonette_core.dylib --language python --out-dir bridge-spike/

      - name: Verify Python Bridge
        run: DYLD_LIBRARY_PATH=target/debug/ python3 bridge-spike/main.py

      - name: Verify C Bridge
        run: |
          clang -I bridge-spike/ -L target/debug/ -ljsonette_core bridge-spike/main.c -o bridge-spike/main_c
          DYLD_LIBRARY_PATH=target/debug/ ./bridge-spike/main_c

      - name: Generate Kotlin Bindings
        run: cargo run --bin uniffi-bindgen -- generate --library target/debug/libjsonette_core.dylib --language kotlin --out-dir bridge-spike/

  # -------------------------------------------------------------------------- #
  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: [build, test, clippy, fmt, ffi-bridge]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish Engine to crates.io
        run: cargo publish
        working-directory: ./engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish CLI to crates.io
        run: cargo publish
        working-directory: ./cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # -------------------------------------------------------------------------- #
  performance:
    name: performance
    runs-on: ubuntu-latest
    needs: [build, test, clippy, fmt]
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build CLI Release
        run: cargo build --release -p jsonette

      - name: Evaluate Engine & CLI Performance
        run: |
          python scripts/benchmark.py
          cat perf_report.md >> $GITHUB_STEP_SUMMARY

      - name: Post Performance Report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('perf_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            })
