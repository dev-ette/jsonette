name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build-cli:
    needs: create-release
    name: Build CLI for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: jsonette
            asset_name: jsonette-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: jsonette
            asset_name: jsonette-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: jsonette
            asset_name: jsonette-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: jsonette.exe
            asset_name: jsonette-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --bin jsonette --target ${{ matrix.target }}

      - name: Prepare Asset
        shell: bash
        run: |
          mkdir -p release-asset
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} release-asset/${{ matrix.asset_name }}

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-asset/${{ matrix.asset_name }}
