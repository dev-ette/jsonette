name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          generate_release_notes: true

  build-cli:
    needs: create-release
    name: Build CLI for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: jsonette
            os_name: linux
            arch: amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: jsonette
            os_name: macos
            arch: amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: jsonette
            os_name: macos
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: jsonette.exe
            os_name: windows
            arch: amd64
            ext: .exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --bin jsonette --target ${{ matrix.target }}

      - name: Prepare Asset
        shell: bash
        run: |
          mkdir -p release-asset
          VERSION=${GITHUB_REF_NAME#v}
          ASSET_BASENAME="jsonette-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          
          # Compress binary into tar.gz or zip depending on OS
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} $ASSET_BASENAME${{ matrix.ext }}
            7z a release-asset/${ASSET_BASENAME}.zip $ASSET_BASENAME${{ matrix.ext }}
          else
            cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} $ASSET_BASENAME
            tar -czvf release-asset/${ASSET_BASENAME}.tar.gz $ASSET_BASENAME
          fi

      - name: Install cargo-deb (Linux only)
        if: matrix.os_name == 'linux'
        run: cargo install cargo-deb

      - name: Build and Prepare .deb (Linux only)
        if: matrix.os_name == 'linux'
        run: |
          cargo deb --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb release-asset/

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: release-asset/*
