name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          generate_release_notes: true

  build-cli:
    needs: create-release
    name: Build CLI for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: jsonette
            os_name: linux
            arch: amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: jsonette
            os_name: macos
            arch: amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: jsonette
            os_name: macos
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: jsonette.exe
            os_name: windows
            arch: amd64
            ext: .exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --bin jsonette --target ${{ matrix.target }}

      - name: Prepare Asset
        shell: bash
        run: |
          mkdir -p release-asset
          VERSION=${GITHUB_REF_NAME#v}
          ASSET_BASENAME="jsonette-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          
          # Compress binary into tar.gz or zip depending on OS
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} $ASSET_BASENAME${{ matrix.ext }}
            7z a release-asset/${ASSET_BASENAME}.zip $ASSET_BASENAME${{ matrix.ext }}
          else
            cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} $ASSET_BASENAME
            tar -czvf release-asset/${ASSET_BASENAME}.tar.gz $ASSET_BASENAME
          fi

      - name: Install Packagers (Linux only)
        if: matrix.os_name == 'linux'
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build and Prepare Packages (Linux only)
        if: matrix.os_name == 'linux'
        run: |
          # Generate .deb
          cargo deb --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb release-asset/
          
          # Generate .rpm
          # cargo-generate-rpm requires the binary to be stripped first
          strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          cargo generate-rpm --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/generate-rpm/*.rpm release-asset/

      - name: Generate Checksums
        shell: bash
        run: |
          cd release-asset
          if [ "$RUNNER_OS" == "Windows" ]; then
            certutil -hashfile jsonette-* SHA256 > SHA256SUMS.txt
          elif [ "$RUNNER_OS" == "macOS" ]; then
            shasum -a 256 * > SHA256SUMS.txt
          else
            sha256sum * > SHA256SUMS.txt
          fi

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: release-asset/*

  publish-winget:
    name: Publish to Winget
    runs-on: windows-latest
    needs: build-cli
    steps:
      - name: Submit to Winget
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: dev-ette.jsonette
          installers-regex: '\.zip$'
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

  publish-aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-aur
        run: cargo install cargo-aur
      - name: Generate AUR Package
        run: cargo aur
      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: jsonette-bin
          pkgbuild: ./target/cargo-aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: maintainer@dev-ette.org
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update AUR package for ${{ github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
