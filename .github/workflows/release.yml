name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          generate_release_notes: true

  build-cli:
    needs: create-release
    name: Build CLI for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: jsonette
            os_name: linux
            arch: amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: jsonette
            os_name: macos
            arch: amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: jsonette
            os_name: macos
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: jsonette.exe
            os_name: windows
            arch: amd64
            ext: .exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --bin jsonette --target ${{ matrix.target }}

      - name: Prepare Asset
        shell: bash
        run: |
          mkdir -p release-asset
          VERSION=${GITHUB_REF_NAME#v}
          ASSET_BASENAME="jsonette-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          
          # Compress binary into tar.gz or zip depending on OS
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} $ASSET_BASENAME${{ matrix.ext }}
            7z a release-asset/${ASSET_BASENAME}.zip $ASSET_BASENAME${{ matrix.ext }}
          else
            cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} $ASSET_BASENAME
            tar -czvf release-asset/${ASSET_BASENAME}.tar.gz $ASSET_BASENAME
          fi

      - name: Install Packagers (Linux only)
        if: matrix.os_name == 'linux'
        run: |
          cargo install cargo-deb

      - name: Build and Prepare Packages (Linux only)
        if: matrix.os_name == 'linux'
        run: |
          # Generate .deb
          cargo deb -p jsonette --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb release-asset/ || cp target/debian/*.deb release-asset/

      - name: Generate Checksums
        shell: bash
        run: |
          cd release-asset
          if [ "$RUNNER_OS" == "Windows" ]; then
            certutil -hashfile jsonette-* SHA256 > SHA256SUMS.txt
          elif [ "$RUNNER_OS" == "macOS" ]; then
            shasum -a 256 * > SHA256SUMS.txt
          else
            sha256sum * > SHA256SUMS.txt
          fi

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: release-asset/*

  publish-winget:
    name: Publish to Winget
    runs-on: windows-latest
    needs: build-cli
    steps:
      - name: Submit to Winget
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: dev-ette.jsonette
          installers-regex: '\.zip$'
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

  publish-aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-aur
        run: cargo install cargo-aur
      - name: Generate AUR Package
        run: cargo aur
      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: jsonette-bin
          pkgbuild: ./target/cargo-aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: maintainer@dev-ette.org
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update AUR package for ${{ github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

  build-macos-app:
    needs: create-release
    name: Build macOS App
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build Engine
        working-directory: engine
        run: cargo build --release

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: "temp-password"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Generate Xcode Project
        working-directory: macos
        run: xcodegen

      - name: Archive App
        working-directory: macos
        run: |
          xcodebuild archive \
            -project jsonette.xcodeproj \
            -scheme jsonette \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/jsonette.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export Archive
        working-directory: macos
        run: |
          cat <<EOF > exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/jsonette.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a ZIP of the app for notarization
          cd $RUNNER_TEMP/export
          /usr/bin/ditto -c -k --keepParent jsonette.app jsonette.zip
          
          xcrun notarytool submit jsonette.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 10m

      - name: Staple App
        run: |
          xcrun stapler staple $RUNNER_TEMP/export/jsonette.app

      - name: Create DMG
        run: |
          hdiutil create -volname jsonette -srcfolder $RUNNER_TEMP/export/jsonette.app -ov -format UDZO jsonette.dmg

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: jsonette.dmg
